<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Rocket JS - Fixed Version</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; font-family: sans-serif; }
        #menu {
            position: absolute; inset: 0; background: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; z-index: 100;
        }
        #ui {
            position: absolute; top: 20px; width: 100%; text-align: center;
            color: white; display: none; pointer-events: none; z-index: 10;
        }
        #scoreboard { font-size: 32px; background: rgba(0,0,0,0.5); padding: 10px 20px; border-radius: 10px; }
        button { padding: 15px 30px; font-size: 20px; cursor: pointer; background: #00bcff; border: none; color: white; border-radius: 5px; }
    </style>
</head>
<body>

<div id="menu">
    <h1>ROCKET JS 3D</h1>
    <p>Besturing: WASD / Pijltjes</p>
    <button id="startBtn">START MATCH</button>
</div>

<div id="ui">
    <div id="scoreboard">BLAUW <span id="s1">0</span> - <span id="s2">0</span> ORANJE</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>

<script>
// We gebruiken normale Javascript (geen modules) om laadfouten te voorkomen
let scene, camera, renderer, world, ball, ballBody, car, carBody;
let score = [0, 0];
const keys = {};

document.getElementById('startBtn').addEventListener('click', function() {
    document.getElementById('menu').style.display = 'none';
    document.getElementById('ui').style.display = 'block';
    init();
});

function init() {
    // 1. SCENE
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050505);
    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // 2. PHYSICS
    world = new CANNON.World();
    world.gravity.set(0, -9.82, 0);

    // 3. GROND
    const groundGeo = new THREE.PlaneGeometry(60, 100);
    const groundMat = new THREE.MeshPhongMaterial({ color: 0x228B22 });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    scene.add(ground);

    const groundBody = new CANNON.Body({ mass: 0 });
    groundBody.addShape(new CANNON.Plane());
    groundBody.quaternion.setFromAxisAngle(new CANNON.Vec3(1,0,0), -Math.PI/2);
    world.addBody(groundBody);

    // 4. BAL
    const ballGeo = new THREE.SphereGeometry(1.5, 16, 16);
    const ballMat = new THREE.MeshPhongMaterial({ color: 0xffffff });
    ball = new THREE.Mesh(ballGeo, ballMat);
    scene.add(ball);

    ballBody = new CANNON.Body({ mass: 1, shape: new CANNON.Sphere(1.5) });
    ballBody.position.set(0, 5, 0);
    world.addBody(ballBody);

    // 5. AUTO
    const carGeo = new THREE.BoxGeometry(2, 1, 4);
    const carMat = new THREE.MeshPhongMaterial({ color: 0x00bcff });
    car = new THREE.Mesh(carGeo, carMat);
    scene.add(car);

    carBody = new CANNON.Body({ mass: 5, shape: new CANNON.Box(new CANNON.Vec3(1, 0.5, 2)) });
    carBody.position.set(0, 1, 30);
    world.addBody(carBody);

    // 6. LICHT
    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(10, 20, 10);
    scene.add(light);
    scene.add(new THREE.AmbientLight(0x404040));

    animate();
}

window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);

function animate() {
    requestAnimationFrame(animate);
    world.step(1/60);

    // Kopieer physics naar beelden
    ball.position.copy(ballBody.position);
    ball.quaternion.copy(ballBody.quaternion);
    car.position.copy(carBody.position);
    car.quaternion.copy(carBody.quaternion);

    // Besturing
    if (keys['KeyW'] || keys['ArrowUp']) {
        const vector = new THREE.Vector3(0, 0, -1).applyQuaternion(car.quaternion);
        carBody.velocity.x += vector.x * 0.5;
        carBody.velocity.z += vector.z * 0.5;
    }
    if (keys['KeyA'] || keys['ArrowLeft']) carBody.angularVelocity.y = 2;
    else if (keys['KeyD'] || keys['ArrowRight']) carBody.angularVelocity.y = -2;
    else carBody.angularVelocity.y = 0;

    // Camera
    camera.position.set(car.position.x, car.position.y + 6, car.position.z + 15);
    camera.lookAt(car.position);

    // Goal Check
    if (ballBody.position.z > 50) { score[1]++; reset(); }
    if (ballBody.position.z < -50) { score[0]++; reset(); }

    renderer.render(scene, camera);
}

function reset() {
    document.getElementById('s1').innerText = score[0];
    document.getElementById('s2').innerText = score[1];
    ballBody.position.set(0, 5, 0);
    ballBody.velocity.set(0, 0, 0);
    carBody.position.set(0, 1, 30);
    carBody.velocity.set(0, 0, 0);
}
</script>
</body>
</html>
