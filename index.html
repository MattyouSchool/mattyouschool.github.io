<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DYLOKI | Core</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="logo">DY<span>LOKI</span></div>
        <ul class="nav-links">
            <li><a href="index.html" style="color: #00d2ff;">Home</a></li>
            <li><a href="games/index.html">Games</a></li>
            <li><a href="shop/index.html">Shop</a></li>
            <li><a href="about/index.html">About</a></li>
        </ul>
        <div class="user-stats-nav">
            <span id="nav-xp">XP: 0</span> | <span id="nav-coins">🪙 0</span>
        </div>
    </nav>

    <header class="hero-premium">
        <div class="hero-content">
            <h1 class="main-title">DYLOKI</h1>
            <p style="letter-spacing: 8px; font-weight: 300; opacity: 0.8;">MATTYOU STUDIOS™ X DYLANO</p>
            <div class="badge-row" style="margin-top:20px; display:flex; gap:10px; justify-content:center;">
                <span class="badge">V5.0 BLUE EDITION</span>
                <span class="badge">CLOUD ACTIVE</span>
            </div>
        </div>
    </header>

    <main class="container">
        <section id="main-content" style="display:none;" class="glass-card">
            <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid rgba(0,210,255,0.2); padding-bottom:20px; margin-bottom:30px;">
                <h2 style="font-family:'Syncopate';">WELCOME, <span id="user-welcome" style="color:#00d2ff;">AGENT</span></h2>
                <button onclick="logout()" style="background:#ff4b2b; color:#fff; border:none; padding:8px 15px; border-radius:8px; cursor:pointer; font-weight:bold;">TERMINATE</button>
            </div>
            <div class="grid">
                <div class="stat-box"><h3>RANK</h3><p id="rank-display" style="color:#00d2ff;">...</p></div>
                <div class="stat-box"><h3>TOTAL XP</h3><p id="xp-display">0</p></div>
                <div class="stat-box"><h3>COINS</h3><p id="coin-display" style="color:#ffcc00;">0</p></div>
            </div>
            <div class="progress-container"><div id="progress-bar" class="progress-bar"></div></div>
        </section>

        <section id="auth-section" class="glass-card">
            <h2 style="text-align:center; margin-bottom:30px; font-family:'Syncopate'; letter-spacing:4px;">IDENTITY ACCESS</h2>
            <div class="grid">
                <div class="auth-box">
                    <h3>LOGIN</h3>
                    <input type="text" id="log-user" placeholder="Username">
                    <input type="password" id="log-pass" placeholder="Password">
                    <button class="btn-primary" onclick="login()">ENTER SYSTEM</button>
                </div>
                <div class="auth-box">
                    <h3>REGISTER</h3>
                    <input type="text" id="reg-user" placeholder="Username">
                    <input type="password" id="reg-pass" placeholder="Password">
                    <button class="btn-secondary" onclick="register()">CREATE ACCOUNT</button>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer-premium">
        <p>MADE BY <strong>MATTYOU STUDIOS™ X DYLANO</strong></p>
    </footer>

    <script type="module" src="script.js"></script>
</body>
</html>
