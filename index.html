<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DYLOKI | Omni-Premium</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Poppins:wght@300;600;900&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="logo">DY<span>LOKI</span></div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="games/index.html">Games</a></li>
            <li><a href="shop/index.html">Shop</a></li>
            <li><a href="about/index.html">About</a></li>
        </ul>
        <div class="user-stats-nav"><span id="nav-xp">XP: 0</span> | <span id="nav-coins">🪙 0</span></div>
    </nav>

    <header class="container" style="text-align: center; padding-top: 100px;">
        <h1 class="logo" style="font-size: 5rem; margin-bottom: 20px;">DY<span>LOKI</span></h1>
        <p style="letter-spacing: 15px; opacity: 0.5;">PREMIUM CLOUD INTERFACE</p>
    </header>

    <main class="container">
        <section id="main-content" style="display:none;" class="glass-card">
            <h2 style="margin-bottom:30px; font-family:'Syncopate';">WELCOME, <span id="user-welcome" style="color:var(--primary);">AGENT</span></h2>
            <div class="grid">
                <div class="stat-box"><h3>RANK</h3><p id="rank-display" style="color:var(--primary); font-size: 2rem; font-weight: 900;">---</p></div>
                <div class="stat-box"><h3>XP</h3><p id="xp-display" style="font-size: 2rem; font-weight: 900;">0</p></div>
                <div class="stat-box"><h3>COINS</h3><p id="coin-display" style="color:#ffd700; font-size: 2rem; font-weight: 900;">0</p></div>
            </div>
            <div class="progress-container"><div id="progress-bar" class="progress-bar"></div></div>
            <button onclick="logout()" style="margin-top:30px; background:transparent; border:1px solid #ff4b2b; color:#ff4b2b; padding:10px 20px; border-radius:10px; cursor:pointer;">DISCONNECT SESSION</button>
        </section>

        <section id="auth-section" class="glass-card">
            <div class="grid">
                <div class="auth-box">
                    <h2 style="margin-bottom:20px; font-family:'Syncopate';">LOGIN</h2>
                    <input type="text" id="log-user" placeholder="Username">
                    <input type="password" id="log-pass" placeholder="Password">
                    <button class="btn-primary" onclick="login()">ENTER SYSTEM</button>
                </div>
                <div class="auth-box">
                    <h2 style="margin-bottom:20px; font-family:'Syncopate';">REGISTER</h2>
                    <input type="text" id="reg-user" placeholder="Choose Username">
                    <input type="password" id="reg-pass" placeholder="Choose Password">
                    <button class="btn-primary" onclick="register()">CREATE IDENTITY</button>
                </div>
            </div>
        </section>
    </main>

    <script type="module" src="script.js"></script>
</body>
</html>
