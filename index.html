<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dyloki | Premium Gaming Platform</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navbar">
        <div class="logo">DYLOKI<span>.</span></div>
        <ul class="nav-links">
            <li><a href="index.html" class="active">Home</a></li>
            <li><a href="games.html">Games</a></li>
            <li><a href="shop.html">Coin Shop</a></li>
            <li><a href="about.html">Over Ons</a></li>
        </ul>
        <div class="user-stats-nav">
            <span id="nav-xp">XP: 0</span>
            <span id="nav-coins" class="coin-text">🪙 0</span>
        </div>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <h1>Welkom bij de toekomst van <span class="highlight">Gaming</span></h1>
            <p>Verdien XP door simpelweg aanwezig te zijn en ontgrendel legendarische ranks.</p>
        </div>
    </header>

    <main class="container">
        <section class="status-card">
            <h2>Jouw Profiel</h2>
            <div class="grid">
                <div class="stat-item">
                    <p>Huidige Rank</p>
                    <h3 id="rank-display" class="glow-text">Beginner</h3>
                </div>
                <div class="stat-item">
                    <p>Totaal XP</p>
                    <h3 id="xp-display">0</h3>
                </div>
                <div class="stat-item">
                    <p>Dyloki Coins</p>
                    <h3 id="coin-display" class="coin-text">0</h3>
                </div>
            </div>
            <div class="progress-bar-container">
                <div id="progress-bar" class="progress-bar"></div>
            </div>
        </section>
    </main>

    <footer>
        <p>Dyloki is made by <strong>mattyou studios™ x Dylano</strong></p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
